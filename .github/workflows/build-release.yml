name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  # ─────────────────────────────────────────────
  # Android – signed universal APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Android project files
        run: flutter create --platforms android .

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias skymart \
            -dname "CN=SkyMart, OU=App, O=SkyMart, L=Dhaka, S=Dhaka, C=BD" \
            -storepass skymart123 -keypass skymart123

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('release.jks')
                      storePassword 'skymart123'
                      keyAlias 'skymart'
                      keyPassword 'skymart123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build universal APK (signed)
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk skymart.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: skymart.apk

  # ─────────────────────────────────────────────
  # iOS – IPA (sideloadable)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate iOS project files
        run: flutter create --platforms ios . --org com.skymart

      - name: Import Distribution Certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: temppass123
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (signed for App Store)
        run: flutter build ipa --release

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --verbose || \
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Package IPA as artifact
        run: cp build/ios/ipa/*.ipa skymart.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: skymart.ipa

  # ─────────────────────────────────────────────
  # GitHub Release – only on version tags
  # ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SkyMart ${{ github.ref_name }}
          body: |
            ## SkyMart ${{ github.ref_name }}

            ### 📥 Downloads
            | Platform | File |
            |----------|------|
            | 🤖 Android | `skymart.apk` — install directly on any Android phone |
            | 🍎 iOS | `skymart.ipa` — sideload via AltStore or Sideloadly |

            ### 🤖 Android Install
            1. Download **skymart.apk**
            2. On your phone: **Settings → Security → Install unknown apps** → enable
            3. Open the APK → tap **Install**

            ### 🍎 iOS Install
            1. Download **skymart.ipa**
            2. Install **[AltStore](https://altstore.io)** or **[Sideloadly](https://sideloadly.io)** on your PC/Mac
            3. Connect your iPhone and sideload the IPA
            4. Go to **Settings → General → VPN & Device Management** → trust the app
          files: |
            artifacts/android/skymart.apk
            artifacts/ios/skymart.ipa
          draft: false
          prerelease: false
