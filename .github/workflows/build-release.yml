name: Build & Release

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]          # build on every push to main
    tags: ['v*.*.*']          # also build on version tags

jobs:
  # ─────────────────────────────────────────────
  # Android – produces a release APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Android project files
        run: flutter create --platforms android .

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # ─────────────────────────────────────────────
  # iOS – produces a release IPA (no signing)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate iOS project files
        run: flutter create --platforms ios .

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r skymart.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: skymart.ipa

  # ─────────────────────────────────────────────
  # GitHub Release – only on version tags
  # ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SkyMart ${{ github.ref_name }}
          body: |
            ## SkyMart ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🤖 Android | `app-arm64-v8a-release.apk` | Best for modern phones |
            | 🤖 Android | `app-armeabi-v7a-release.apk` | Older devices |
            | 🍎 iOS | `skymart.ipa` | Sideload via AltStore / Sideloadly |

            ### Android Install
            1. Download the APK
            2. On your phone go to **Settings → Security → Install unknown apps**
            3. Open the APK and tap Install

            ### iOS Install
            1. Download `skymart.ipa`
            2. Use **AltStore** or **Sideloadly** to install
          files: |
            artifacts/android/*.apk
            artifacts/ios/skymart.ipa
          draft: false
          prerelease: false
