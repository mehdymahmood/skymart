name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  # ─────────────────────────────────────────────
  # Android – signed universal APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Android project files
        run: flutter create --platforms android .

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias skymart \
            -dname "CN=SkyMart, OU=App, O=SkyMart, L=Dhaka, S=Dhaka, C=BD" \
            -storepass skymart123 -keypass skymart123

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('release.jks')
                      storePassword 'skymart123'
                      keyAlias 'skymart'
                      keyPassword 'skymart123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build universal APK (signed)
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk skymart.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: skymart.apk

  # ─────────────────────────────────────────────
  # iOS – IPA (sideloadable)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate iOS project files
        run: flutter create --platforms ios .

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r skymart.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: skymart.ipa

  # ─────────────────────────────────────────────
  # Deploy download page to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-page:
    name: Deploy Download Page
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  # GitHub Release – only on version tags
  # ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SkyMart ${{ github.ref_name }}
          body: |
            ## SkyMart ${{ github.ref_name }}

            ### 📥 Downloads
            | Platform | File |
            |----------|------|
            | 🤖 Android | `skymart.apk` — install directly on any Android phone |
            | 🍎 iOS | `skymart.ipa` — sideload via AltStore or Sideloadly |

            ### 🤖 Android Install
            1. Download **skymart.apk**
            2. On your phone: **Settings → Security → Install unknown apps** → enable
            3. Open the APK → tap **Install**

            ### 🍎 iOS Install
            1. Download **skymart.ipa**
            2. Install **[AltStore](https://altstore.io)** or **[Sideloadly](https://sideloadly.io)** on your PC/Mac
            3. Connect your iPhone and sideload the IPA
            4. Go to **Settings → General → VPN & Device Management** → trust the app
          files: |
            artifacts/android/skymart.apk
            artifacts/ios/skymart.ipa
          draft: false
          prerelease: false
